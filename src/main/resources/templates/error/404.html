<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content" class="text-center py-5">
    <h1 class="display-1 text-muted">404</h1>
    <i class="bi bi-exclamation-triangle fs-1 text-warning"></i>
    <h2 class="mt-3">Risorsa non trovata</h2>
    <p class="text-muted" th:text="${errorMessage} ?: 'La risorsa richiesta non è disponibile.'">
        La risorsa richiesta non è disponibile.
    </p>
    <a th:href="@{/dashboard}" class="btn btn-primary mt-3">
        <i class="bi bi-house-door"></i> Torna alla Dashboard
    </a>
</div>
</body>
</html>

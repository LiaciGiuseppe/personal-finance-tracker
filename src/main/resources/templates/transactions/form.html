<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="mb-4">
                        <i class="bi" th:classappend="${transaction.id != null} ? 'bi-pencil' : 'bi-plus-circle'"></i>
                        <span th:text="${transaction.id != null} ? 'Modifica Transazione' : 'Nuova Transazione'">
                            Nuova Transazione
                        </span>
                    </h2>

                    <form th:action="${transaction.id != null} ? @{/transactions/{id}/edit(id=${transaction.id})} : @{/transactions/new}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="amount" class="form-label">Importo</label>
                            <input type="number" id="amount" name="amount"
                                   th:value="${transaction.amount}"
                                   class="form-control" step="0.01" min="0" required>
                        </div>

                        <div class="mb-3">
                            <label for="type" class="form-label">Tipo</label>
                            <select id="type" name="type" class="form-select" required>
                                <option value="">Seleziona tipo</option>
                                <option value="INCOME"
                                        th:selected="${transaction.type?.name() == 'INCOME'}">Entrata</option>
                                <option value="EXPENSE"
                                        th:selected="${transaction.type?.name() == 'EXPENSE'}">Uscita</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="date" class="form-label">Data</label>
                            <input type="date" id="date" name="date"
                                   th:value="${transaction.date}"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Descrizione</label>
                            <textarea id="description" name="description"
                                      class="form-control" rows="3"
                                      placeholder="Descrizione (opzionale)"
                                      th:text="${transaction.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Categoria</label>
                            <select id="categoryId" name="categoryId" class="form-select">
                                <option value="">Seleziona categoria</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${transaction.category?.id == cat.id}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="paymentMethodId" class="form-label">Metodo di Pagamento</label>
                            <select id="paymentMethodId" name="paymentMethodId" class="form-select">
                                <option value="">Seleziona metodo</option>
                                <option th:each="pm : ${paymentMethods}" th:value="${pm.id}"
                                        th:text="${pm.name}"
                                        th:selected="${transaction.paymentMethod?.id == pm.id}"></option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" id="isPlanned" name="isPlanned" value="true"
                                   class="form-check-input"
                                   th:checked="${transaction.isPlanned}"
                                   onchange="togglePlannedFields(this.checked)">
                            <label for="isPlanned" class="form-check-label">Transazione pianificata</label>
                        </div>

                        <div id="plannedFields" style="display: none;">
                            <div class="mb-3">
                                <label for="plannedDate" class="form-label">Data Pianificata</label>
                                <input type="date" id="plannedDate" name="plannedDate"
                                       th:value="${transaction.plannedDate}"
                                       class="form-control">
                            </div>

                            <div class="mb-3">
                                <label for="recurrence" class="form-label">Ricorrenza</label>
                                <select id="recurrence" name="recurrence" class="form-select">
                                    <option value="NONE"
                                            th:selected="${transaction.recurrence?.name() == 'NONE'}">Nessuna</option>
                                    <option value="WEEKLY"
                                            th:selected="${transaction.recurrence?.name() == 'WEEKLY'}">Settimanale</option>
                                    <option value="MONTHLY"
                                            th:selected="${transaction.recurrence?.name() == 'MONTHLY'}">Mensile</option>
                                    <option value="YEARLY"
                                            th:selected="${transaction.recurrence?.name() == 'YEARLY'}">Annuale</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg"></i>
                                <span th:text="${transaction.id != null} ? 'Aggiorna' : 'Salva'">
                                    Salva
                                </span>
                            </button>
                            <a th:href="@{/transactions}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Annulla
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePlannedFields(checked) {
        document.getElementById('plannedFields').style.display = checked ? 'block' : 'none';
    }

    window.onload = function() {
        var isPlannedCheckbox = document.getElementById('isPlanned');
        if (isPlannedCheckbox) {
            togglePlannedFields(isPlannedCheckbox.checked);
        }
    };
</script>
</body>
</html>

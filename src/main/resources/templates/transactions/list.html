<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content">
    <h1 class="mb-3"><i class="bi bi-list-ul"></i> Transazioni</h1>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <a th:href="@{/transactions/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuova Transazione
        </a>
        <form th:action="@{/export}" method="get" class="d-inline m-0">
            <input type="hidden" name="dateFrom" th:value="${filter?.dateFrom}" />
            <input type="hidden" name="dateTo" th:value="${filter?.dateTo}" />
            <input type="hidden" name="categoryId" th:value="${filter?.categoryId}" />
            <button type="submit" class="btn btn-success"
                    title="Scarica le transazioni attualmente visualizzate in formato Excel. Verranno esportati solo i dati risultanti dai filtri applicati.">
                <i class="bi bi-file-earmark-excel"></i> Esporta in Excel
            </button>
        </form>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-funnel"></i> Filtri</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/transactions}" method="get" class="row g-3">
                <input type="hidden" name="page" value="0" />
                <div class="col-md-3">
                    <label for="dateFrom" class="form-label">Data da</label>
                    <input type="date" id="dateFrom" name="dateFrom" th:value="${filter?.dateFrom}"
                           class="form-control">
                </div>
                <div class="col-md-3">
                    <label for="dateTo" class="form-label">Data a</label>
                    <input type="date" id="dateTo" name="dateTo" th:value="${filter?.dateTo}"
                           class="form-control">
                </div>
                <div class="col-md-3">
                    <label for="categoryId" class="form-label">Categoria</label>
                    <select id="categoryId" name="categoryId" class="form-select">
                        <option value="">Tutte</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${filter?.categoryId == cat.id}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <div class="d-grid gap-2 w-100">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Filtra
                        </button>
                        <a th:href="@{/transactions}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Reset
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>


    <div class="card">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-4">
                <i class="bi bi-inbox fs-1 text-muted"></i>
                <p class="text-muted mt-2">Nessuna transazione trovata.</p>
            </div>
            <div th:unless="${#lists.isEmpty(transactions)}">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrizione</th>
                                <th>Categoria</th>
                                <th>Metodo di Pagamento</th>
                                <th>Tipo</th>
                                <th>Importo</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="t : ${transactions}">
                                <td th:text="${#temporals.format(t.date, 'dd/MM/yyyy')}">01/01/2026</td>
                                <td th:text="${t.description}">Descrizione</td>
                                <td th:text="${t.category?.name}">Categoria</td>
                                <td th:text="${t.paymentMethod?.name}">Metodo</td>
                                <td>
                                    <span th:if="${t.type.name() == 'INCOME'}"
                                          class="badge bg-success">Entrata</span>
                                    <span th:if="${t.type.name() == 'EXPENSE'}"
                                          class="badge bg-danger">Uscita</span>
                                </td>
                                <td th:text="|€ ${#numbers.formatDecimal(t.amount, 1, 2)}|">€ 0.00</td>
                                <td>
                                    <a th:href="@{/transactions/{id}/edit(id=${t.id})}"
                                       class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/transactions/{id}/delete(id=${t.id})}"
                                          method="post" style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-danger"
                                                onclick="return confirm('Eliminare questa transazione?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${totalPages > 1}" aria-label="Navigazione pagine">
                    <ul class="pagination justify-content-center mt-3">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/transactions(page=0, dateFrom=${filter?.dateFrom}, dateTo=${filter?.dateTo}, categoryId=${filter?.categoryId})}">
                                <i class="bi bi-chevron-bar-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/transactions(page=${currentPage - 1}, dateFrom=${filter?.dateFrom}, dateTo=${filter?.dateTo}, categoryId=${filter?.categoryId})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active'"
                            th:if="${i >= currentPage - 2 and i <= currentPage + 2}">
                            <a class="page-link" th:href="@{/transactions(page=${i}, dateFrom=${filter?.dateFrom}, dateTo=${filter?.dateTo}, categoryId=${filter?.categoryId})}"
                               th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/transactions(page=${currentPage + 1}, dateFrom=${filter?.dateFrom}, dateTo=${filter?.dateTo}, categoryId=${filter?.categoryId})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/transactions(page=${totalPages - 1}, dateFrom=${filter?.dateFrom}, dateTo=${filter?.dateTo}, categoryId=${filter?.categoryId})}">
                                <i class="bi bi-chevron-bar-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
</body>
</html>

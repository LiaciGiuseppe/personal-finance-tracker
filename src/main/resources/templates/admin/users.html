<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content">
    <h1 class="mb-4"><i class="bi bi-people"></i> Gestione Utenti</h1>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Abilitato</th>
                            <th>Ruoli</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}">1</td>
                            <td th:text="${u.username}">email@example.com</td>
                            <td>
                                <span th:if="${u.enabled}" class="badge bg-success">
                                    <i class="bi bi-check-circle"></i> Attivo
                                </span>
                                <span th:unless="${u.enabled}" class="badge bg-danger">
                                    <i class="bi bi-x-circle"></i> Disabilitato
                                </span>
                            </td>
                            <td>
                                <span th:each="role : ${u.roles}"
                                      class="badge bg-info me-1" th:text="${role.name}">
                                    ROLE_USER
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>

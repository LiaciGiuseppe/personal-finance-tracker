<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content" class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-person-plus"></i> Registrati
                </h2>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span th:each="err : ${#fields.allErrors()}" th:text="${err}" class="d-block">Errore</span>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Email</label>
                        <input type="email" id="username" th:field="*{username}"
                               class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                               placeholder="la tua@email.com">
                        <div class="invalid-feedback" th:errors="*{username}">Errore email</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" th:field="*{password}"
                               class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                               placeholder="Almeno 8 caratteri" oninput="checkPasswordStrength()">
                        <div class="invalid-feedback" th:errors="*{password}">Errore password</div>

                        <div class="mt-2 small" id="passwordRequirements">
                            <div class="text-muted mb-1">La password deve contenere:</div>
                            <ul class="list-unstyled mb-0">
                                <li id="req-length" class="text-muted">
                                    <i class="bi bi-circle"></i> Almeno 8 caratteri
                                </li>
                                <li id="req-upper" class="text-muted">
                                    <i class="bi bi-circle"></i> Almeno una lettera maiuscola
                                </li>
                                <li id="req-lower" class="text-muted">
                                    <i class="bi bi-circle"></i> Almeno una lettera minuscola
                                </li>
                                <li id="req-special" class="text-muted">
                                    <i class="bi bi-circle"></i> Almeno un carattere speciale
                                </li>
                            </ul>
                        </div>

                        <div class="mt-2" id="passwordStrength" style="display:none;">
                            <div class="progress" style="height: 8px;">
                                <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                            <small id="strengthLabel" class="mt-1 d-block"></small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Conferma Password</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                               class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                               placeholder="Ripeti password">
                        <div class="invalid-feedback" th:errors="*{confirmPassword}">Errore conferma</div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-person-check"></i> Registrati
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p>Hai già un account?
                        <a th:href="@{/login}">Accedi</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
<script>
function checkPasswordStrength() {
    const password = document.getElementById('password').value;
    const strengthDiv = document.getElementById('passwordStrength');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');

    const hasLength = password.length >= 8;
    const hasUpper = /[A-Z]/.test(password);
    const hasLower = /[a-z]/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

    updateRequirement('req-length', hasLength);
    updateRequirement('req-upper', hasUpper);
    updateRequirement('req-lower', hasLower);
    updateRequirement('req-special', hasSpecial);

    let score = 0;
    if (hasLength) score++;
    if (hasUpper) score++;
    if (hasLower) score++;
    if (hasSpecial) score++;

    if (password.length === 0) {
        strengthDiv.style.display = 'none';
        return;
    }
    strengthDiv.style.display = 'block';

    let percent, level, barColor, textColor;
    if (score <= 2) {
        percent = 33;
        level = 'Scarsa';
        barColor = 'bg-danger';
        textColor = 'text-danger';
    } else if (score === 3) {
        percent = 66;
        level = 'Buona';
        barColor = 'bg-warning';
        textColor = 'text-warning';
    } else {
        percent = 100;
        level = 'Eccellente';
        barColor = 'bg-success';
        textColor = 'text-success';
    }

    strengthBar.style.width = percent + '%';
    strengthBar.className = 'progress-bar ' + barColor;
    strengthLabel.textContent = level;
    strengthLabel.className = 'mt-1 d-block fw-semibold ' + textColor;
}

function updateRequirement(id, met) {
    const el = document.getElementById(id);
    const icon = el.querySelector('i');
    if (met) {
        icon.className = 'bi bi-check-circle-fill text-success';
        el.className = 'text-success';
    } else {
        icon.className = 'bi bi-circle text-muted';
        el.className = 'text-muted';
    }
}
</script>
</div>
</body>
</html>

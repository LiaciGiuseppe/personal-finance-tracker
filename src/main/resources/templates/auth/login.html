<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content" class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right"></i> Accedi
                </h2>

                <div th:if="${param.error}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i> Credenziali non valide. Riprova.
                </div>

                <div th:if="${param.registered}" class="alert alert-success">
                    <i class="bi bi-check-circle"></i> Registrazione completata! Ora puoi accedere.
                </div>

                <div th:if="${param.logout}" class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Disconnessione effettuata.
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">
                        <label for="username" class="form-label">Email</label>
                        <input type="email" id="username" name="username" class="form-control"
                               placeholder="la tua@email.com" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="Password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Accedi
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p>Non hai un account?
                        <a th:href="@{/register}">Registrati</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

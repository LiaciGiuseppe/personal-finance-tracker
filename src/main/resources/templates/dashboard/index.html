<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-speedometer2"></i> Dashboard</h1>
        <a th:href="@{/transactions/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuova Transazione
        </a>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-bg-success">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-arrow-up-circle"></i> Entrate
                    </h5>
                    <p class="card-text display-6" th:text="|€ ${#numbers.formatDecimal(summary['totalIncome'], 1, 2)}|">
                        € 0.00
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-bg-danger">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-arrow-down-circle"></i> Uscite
                    </h5>
                    <p class="card-text display-6" th:text="|€ ${#numbers.formatDecimal(summary['totalExpense'], 1, 2)}|">
                        € 0.00
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-bg-info">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-wallet2"></i> Saldo
                    </h5>
                    <p class="card-text display-6" th:text="|€ ${#numbers.formatDecimal(summary['balance'], 1, 2)}|">
                        € 0.00
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-clock-history"></i> Transazioni Recenti</h5>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-4">
                <i class="bi bi-inbox fs-1 text-muted"></i>
                <p class="text-muted mt-2">Nessuna transazione trovata.</p>
                <a th:href="@{/transactions/new}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Crea la prima transazione
                </a>
            </div>
            <div th:unless="${#lists.isEmpty(transactions)}">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrizione</th>
                            <th>Categoria</th>
                            <th>Tipo</th>
                            <th>Importo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${transactions}">
                            <td th:text="${#temporals.format(t.date, 'dd/MM/yyyy')}">01/01/2026</td>
                            <td th:text="${t.description}">Descrizione</td>
                            <td th:text="${t.category?.name}">Categoria</td>
                            <td>
                                <span th:if="${t.type.name() == 'INCOME'}"
                                      class="badge bg-success">Entrata</span>
                                <span th:if="${t.type.name() == 'EXPENSE'}"
                                      class="badge bg-danger">Uscita</span>
                            </td>
                            <td th:text="|€ ${#numbers.formatDecimal(t.amount, 1, 2)}|">€ 0.00</td>
                        </tr>
                    </tbody>
                </table>
                <div class="text-end">
                    <a th:href="@{/transactions}" class="btn btn-outline-primary">
                        <i class="bi bi-list-ul"></i> Vedi tutte le transazioni
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

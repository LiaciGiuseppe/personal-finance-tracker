# DataSource SQLite
spring.datasource.url=jdbc:sqlite:finance_tracker.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.com.portfolio=DEBUG

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# App
spring.application.name=finance-tracker
server.port=8081

# Error handling
server.error.include-stacktrace=always

# Credenziali admin iniziale
app.admin.username=admin@financetracker.local
app.admin.password=AdminPassword123!

# VAPID keys for Web Push Notifications - loaded from environment variables
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}
vapid.subject=${VAPID_SUBJECT:mailto:admin@financetracker.local}
